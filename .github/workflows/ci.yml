name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests + coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Frontend coverage report (PR comment)
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          working-directory: frontend

      - name: Backend tests + coverage
        run: npm run test:coverage
        working-directory: backend

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        if: always()
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: frontend/coverage/lcov.info,backend/coverage/lcov.info
        continue-on-error: true

      - name: Frontend build
        run: npm run build
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}

  e2e:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Seed test database
        run: node scripts/seed-test-db.js
        working-directory: backend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run E2E smoke tests
        run: npx playwright test --project=smoke
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}

      - name: Run E2E auth tests
        working-directory: frontend
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_USER_SUPER: ${{ secrets.E2E_USER_SUPER }}
          E2E_USER_SCOPED: ${{ secrets.E2E_USER_SCOPED }}
          E2E_USER_MULTI: ${{ secrets.E2E_USER_MULTI }}
          E2E_USER_NOACCESS: ${{ secrets.E2E_USER_NOACCESS }}
        run: |
          if [ -n "$CLERK_SECRET_KEY" ]; then
            npx playwright test --project=auth
          else
            echo "Skipping auth E2E tests — CLERK_SECRET_KEY not set"
          fi
