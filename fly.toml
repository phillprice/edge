app = 'edge-whcc'
primary_region = 'lhr'

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/cricket.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "cricket_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
